version: '3'

includes:
  common: ./build/Taskfile.yml

vars:
  NAME: passman
  FRONTEND_DIR: frontend
  BIN_DIR: build/bin
  PACKAGE_MANAGER: bun
  APP_NAME: passman
  VITE_PORT: 9245

tasks:
  build:
    desc: Build the application
    deps:
      - task: common:build:frontend
        vars:
          DEV: "true"
    cmds:
      - CGO_ENABLED=1 go build -tags gtk3 -o "{{.BIN_DIR}}/{{.NAME}}" .

  dev:
    desc: Run in development mode with hot reload
    cmds:
      - wails3 dev -config ./build/config.yml

  generate:
    desc: Generate Wails bindings
    cmds:
      - wails3 generate bindings

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  run:
    desc: Run the application
    cmds:
      - '"./{{.BIN_DIR}}/{{.NAME}}"'
