version: '3'

vars:
  NAME: passman
  FRONTEND_DIR: frontend
  BIN_DIR: build/bin

tasks:
  build:
    desc: Build the production binary
    cmds:
      - task: build:frontend
      - task: build:app

  build:frontend:
    desc: Build the frontend assets
    dir: {{.FRONTEND_DIR}}
    cmds:
      - bun install
      - bun run build

  build:app:
    desc: Build the Go application
    cmds:
      - CGO_ENABLED=1 go build -tags gtk3 -o {{.BIN_DIR}}/{{.NAME}} .

  dev:
    desc: Run in development mode with hot reload
    cmds:
      - wails3 dev

  generate:
    desc: Generate Wails bindings
    cmds:
      - wails3 generate bindings

  test:
    desc: Run Go tests
    cmds:
      - go test ./...
