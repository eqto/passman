name: Build

on:
  release:
    types: [created]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libglib2.0-dev build-essential pkg-config
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Generate bindings
        run: wails3 generate bindings -tags gtk3
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test ./...
      - name: Build frontend
        run: |
          cd frontend
          bun install
          bun run build
      - name: Build app
        run: CGO_ENABLED=1 go build -tags gtk3 -o /tmp/passman .
  build-app:
    name: Build App (${{ matrix.target }})
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: passman-linux-amd64
            goarch: amd64
            package: rpm
          - os: ubuntu-latest
            target: linux-amd64
            artifact: passman-linux-amd64
            goarch: amd64
            package: deb
          - os: windows-latest
            target: windows-amd64
            artifact: passman-windows-amd64.exe
            goarch: amd64
            package: msi
          - os: windows-latest
            target: windows-arm64
            artifact: passman-windows-arm64.exe
            goarch: arm64
            package: none
          - os: macos-latest
            target: darwin-arm64
            artifact: passman-darwin-arm64
            goarch: arm64
            package: dmg
          - os: macos-13
            target: darwin-amd64
            artifact: passman-darwin-amd64
            goarch: amd64
            package: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libglib2.0-dev build-essential pkg-config
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Generate bindings
        run: wails3 generate bindings ${{ matrix.os == 'ubuntu-latest' && '-tags gtk3' || '' }}
      - name: Build frontend
        run: |
          cd frontend
          bun install
          bun run build
      - name: Build app
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch }}
        run: go build ${{ matrix.os == 'ubuntu-latest' && '-tags gtk3' || '' }} -o ${{ matrix.artifact }} .
      - name: Package .rpm
        if: matrix.package == 'rpm'
        run: |
          gem install --no-document fpm
          fpm -s dir -t rpm -n passman -v ${{ github.ref_name }} -p passman-${{ github.ref_name }}-1.x86_64.rpm \
            --prefix /usr/local/bin ${{ matrix.artifact }}
      - name: Package .deb
        if: matrix.package == 'deb'
        run: |
          gem install --no-document fpm
          fpm -s dir -t deb -n passman -v ${{ github.ref_name }} -p passman_${{ github.ref_name }}_amd64.deb \
            --prefix /usr/local/bin ${{ matrix.artifact }}
      - name: Package .dmg
        if: matrix.package == 'dmg'
        run: |
          hdiutil create -volname "Passman" -srcfolder ${{ matrix.artifact }} -fs APFS -format UDZO passman-${{ matrix.target }}.dmg
      - name: Package .msi
        if: matrix.package == 'msi'
        run: |
          echo "MSI packaging requires WiX toolset - skipping for now, uploading plain .exe"
      - name: Upload binary to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload .rpm to release
        if: matrix.package == 'rpm'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: passman-${{ github.ref_name }}-1.x86_64.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload .deb to release
        if: matrix.package == 'deb'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: passman_${{ github.ref_name }}_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload .dmg to release
        if: matrix.package == 'dmg'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: passman-${{ matrix.target }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
