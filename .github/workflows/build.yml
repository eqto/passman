name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  lint-and-test:
    name: Lint & Test Core / CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -p passman-core -p passman-cli -- -D warnings
      - run: cargo test -p passman-core -p passman-cli

  build-cli:
    name: Build CLI (${{ matrix.os }})
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: passman-cli-linux-x64
            binary_name: passman-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: passman-cli-windows-x64
            binary_name: passman-cli.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: passman-cli-macos-x64
            binary_name: passman-cli
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: passman-cli-macos-arm64
            binary_name: passman-cli
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build -p passman-cli --release --target ${{ matrix.target }}
      - name: Stage CLI binary with platform-specific name
        run: |
          mkdir -p staging
          if [ "${{ matrix.binary_name }}" = "passman-cli.exe" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/${{ matrix.artifact_name }}.exe
          else
            cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/${{ matrix.artifact_name }}
          fi
        shell: bash
      - name: Upload CLI binary to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: staging/${{ matrix.artifact_name }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-app:
    name: Build App (${{ matrix.os }} / ${{ matrix.bundle }})
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: deb
            artifact: '**/*.deb'
          - os: ubuntu-latest
            bundle: rpm
            artifact: '**/*.rpm'
          - os: ubuntu-latest
            bundle: appimage
            artifact: '**/*.AppImage'
          - os: windows-latest
            bundle: nsis
            artifact: '**/*.exe'
            portable: target/release/passman-portable.exe
          - os: macos-latest
            bundle: dmg
            artifact: '**/*.dmg'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.2.0
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('passman-app/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libglib2.0-dev build-essential curl wget libssl-dev libayatana-appindicator3-dev librsvg2-dev pkg-config
      - name: Verify pkg-config
        if: matrix.os == 'ubuntu-latest'
        run: pkg-config --exists glib-2.0 gobject-2.0 gtk+-3.0
      - run: bun install --frozen-lockfile
        working-directory: ./passman-app
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./passman-app
          args: --bundles ${{ matrix.bundle }}
      - name: Upload bundle to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            passman-app/src-tauri/target/release/bundle/${{ matrix.artifact }}
            target/release/bundle/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename Windows portable binary
        if: matrix.portable
        run: mv target/release/passman-app.exe target/release/passman-portable.exe
        shell: bash
      - name: Upload Windows portable binary to release
        if: matrix.portable
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.portable }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
