name: Build

on:
  release:
    types: [created]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.2.0
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libglib2.0-dev build-essential pkg-config
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test ./...
      - name: Build frontend
        run: |
          cd frontend
          bun install
          bun run build
      - name: Build app
        run: CGO_ENABLED=1 go build -tags gtk3 -o /tmp/passman .
      - name: Build CLI
        run: go build -o /tmp/passman-cli ./cmd/passman-cli

  build-app:
    name: Build App (${{ matrix.os }})
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: passman-linux-amd64
          - os: windows-latest
            artifact: passman-windows-amd64.exe
          - os: macos-latest
            artifact: passman-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.2.0
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libglib2.0-dev build-essential pkg-config
      - name: Build frontend
        run: |
          cd frontend
          bun install
          bun run build
      - name: Build app
        env:
          CGO_ENABLED: "1"
        run: go build -tags gtk3 -o ${{ matrix.artifact }} .
      - name: Upload binary to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-cli:
    name: Build CLI (${{ matrix.os }})
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: passman-cli-linux-amd64
          - os: windows-latest
            artifact: passman-cli-windows-amd64.exe
          - os: macos-latest
            artifact: passman-cli-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build CLI
        run: go build -o ${{ matrix.artifact }} ./cmd/passman-cli
      - name: Upload binary to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
