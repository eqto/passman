name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libsoup2.4-dev build-essential curl wget libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test -p passman-core -p passman-cli

  build-cli:
    name: Build CLI (${{ matrix.os }})
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: passman-cli-linux-x64
            binary_name: passman-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: passman-cli-windows-x64
            binary_name: passman-cli.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: passman-cli-macos-x64
            binary_name: passman-cli
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build -p passman-cli --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}

  build-app:
    name: Build App (${{ matrix.os }})
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.2.0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libsoup2.4-dev build-essential curl wget libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: bun install
        working-directory: ./passman-app
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./passman-app
          args: ""
      - name: Upload bundles
        uses: actions/upload-artifact@v7
        with:
          name: passman-bundle-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.exe
      - name: Upload Windows portable
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: passman-portable-windows
          path: target/release/passman-app.exe

  upload-artifacts:
    name: Upload to Release
    if: github.event_name == 'release'
    needs: [build-cli, build-app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: passman-cli-*
          path: ./artifacts
      - uses: actions/download-artifact@v8
        with:
          pattern: passman-bundle-*
          path: ./artifacts
      - uses: actions/download-artifact@v8
        with:
          pattern: passman-portable-windows
          path: ./artifacts
      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
